<html lang="ko">
<head>

<meta name="apple-mobile-web-app-capable" content="yes" />

<meta name="apple-mobile-web-app-title" content="가계부" />

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500;0,9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap');

:root{
  --paper:#F3EDE0; --card:#FBF8F1; --ink:#211C15; --ink-soft:#796E5B;
  --line:#DDD3BE; --line2:#E8DFCC; --income:#2C7A52; --expense:#BB3B27; --accent:#1F4E45;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--paper);}
body{
  font-family:'IBM Plex Sans KR',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',system-ui,sans-serif;
  color:var(--ink);
}
#app{
  background:var(--paper); min-height:100vh; max-width:560px; margin:0 auto;
  position:relative; padding-bottom:calc(48px + env(safe-area-inset-bottom));
}
.center{display:flex;align-items:center;justify-content:center;min-height:80vh;}
.num,.balinput{font-family:'IBM Plex Mono',ui-monospace,monospace;font-variant-numeric:tabular-nums;}
.inc{color:var(--income);} .exp{color:var(--expense);} .strong{font-weight:600;} .muted{color:var(--ink-soft);font-weight:400;}

.masthead{display:flex;align-items:flex-end;justify-content:space-between;padding:calc(20px + env(safe-area-inset-top)) 18px 14px;border-bottom:2px solid var(--ink);}
.brand{display:flex;align-items:baseline;gap:8px;}
.brand-ko{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
.brand-en{font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--ink-soft);}
.monthnav{display:flex;align-items:center;gap:6px;}
.navbtn{width:30px;height:30px;border:1px solid var(--line);background:var(--card);border-radius:50%;font-size:18px;line-height:1;cursor:pointer;color:var(--ink);}
.navbtn:active{background:var(--ink);color:#fff;}
.monthlabel{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;min-width:92px;text-align:center;}

.tabs{display:flex;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:5;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1 0 auto;padding:12px 12px;background:none;border:none;cursor:pointer;font-family:inherit;font-size:12.5px;color:var(--ink-soft);font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.tab.on{color:var(--ink);border-bottom-color:var(--ink);font-weight:600;}

.content{padding:16px 16px 24px;}
.hint{font-size:12.5px;color:var(--ink-soft);line-height:1.5;margin:2px 0 14px;}
.hint b{color:var(--ink);font-weight:600;}

.filterrow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.pill{padding:6px 12px;border:1px solid var(--line);background:var(--card);border-radius:20px;font-family:inherit;font-size:12.5px;cursor:pointer;color:var(--ink);}

.tl-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line2);border:1px solid var(--line2);margin-bottom:14px;border-radius:8px;overflow:hidden;}
.tl-summary.cols3{grid-template-columns:repeat(3,1fr);}
.tl-sum-cell{background:var(--card);padding:9px 8px;display:flex;flex-direction:column;gap:3px;}
.tl-sum-cell .lbl{font-size:10.5px;color:var(--ink-soft);}
.tl-sum-cell .num{font-size:13px;font-weight:500;}

.warn{background:#F7E3DE;border:1px solid #E3B5AC;border-radius:8px;padding:10px 12px;font-size:12.5px;color:#7A2A1B;margin-bottom:14px;line-height:1.5;}
.warn b{font-family:'IBM Plex Mono',monospace;}

.ledger{border-top:1px solid var(--line);}
.day{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--line2);}
.day-rail{flex-shrink:0;width:42px;display:flex;flex-direction:column;align-items:center;}
.day-num{font-family:'Fraunces',serif;font-size:24px;font-weight:600;line-height:1;}
.day-suffix{font-size:10px;color:var(--ink-soft);margin-top:2px;}
.day-body{flex:1;display:flex;flex-direction:column;gap:8px;min-width:0;}
.event{display:flex;align-items:center;gap:9px;position:relative;}
.ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ev-main{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;}
.ev-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-meta{font-size:11px;color:var(--ink-soft);}
.ev-amt{font-family:'IBM Plex Mono',monospace;font-size:13.5px;font-weight:500;font-variant-numeric:tabular-nums;flex-shrink:0;}
.del{background:none;border:none;color:var(--ink-soft);font-size:11px;cursor:pointer;padding:2px 4px;flex-shrink:0;}
.day-balance{font-family:'IBM Plex Mono',monospace;font-size:11.5px;text-align:right;padding-top:2px;border-top:1px dashed var(--line);font-variant-numeric:tabular-nums;}

.empty{text-align:center;color:var(--ink-soft);padding:30px 0;font-size:13px;}
.empty.sm{padding:10px 0;font-size:12px;}

.addbtn{width:100%;margin-top:16px;padding:13px;background:var(--ink);color:var(--paper);border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.addbtn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line);}
.addbtn:active{opacity:.85;}
.row2{display:flex;gap:10px;}
.flex1{flex:1;}

.acard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
.acard-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.acard-chip{width:12px;height:12px;border-radius:3px;}
.acard-name{font-size:15px;font-weight:600;flex:1;}
.mini{background:none;border:1px solid var(--line);border-radius:6px;padding:4px 9px;font-size:11.5px;font-family:inherit;cursor:pointer;color:var(--ink);}
.mini.danger{color:var(--expense);border-color:#E3B5AC;}
.acard-grid,.icard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.acell{display:flex;flex-direction:column;gap:3px;}
.acell .lbl{font-size:10.5px;color:var(--ink-soft);}
.acell .num{font-size:14px;}
.balinput{width:100%;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:14px;background:var(--paper);color:var(--ink);}

.fsec{margin-bottom:18px;}
.fsec-head{font-size:12px;font-weight:600;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;padding-bottom:8px;border-bottom:1px solid var(--ink);margin-bottom:4px;}
.frow{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--line2);cursor:pointer;}
.fday{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);width:32px;flex-shrink:0;}

.icard{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;cursor:pointer;}
.icard-top{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.ibar{height:6px;background:var(--line2);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.ibar-fill{height:100%;border-radius:3px;transition:width .3s;}
.pcompare{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line2);border:1px solid var(--line2);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.pc-cell{background:var(--card);padding:9px 10px;display:flex;flex-direction:column;gap:2px;}
.pc-cell .lbl{font-size:10.5px;color:var(--ink-soft);}
.pc-cell .num{font-size:15px;}
.pc-sub{font-size:10.5px;color:var(--ink-soft);}
.pflag{font-size:12px;border-radius:7px;padding:8px 10px;margin-bottom:10px;line-height:1.4;}
.pflag b{font-family:'IBM Plex Mono',monospace;}
.warn-up{background:#F7E3DE;color:#7A2A1B;}
.warn-ok{background:#E2EFE8;color:#1F5C40;}
.phist{border-top:1px dashed var(--line);padding-top:8px;}
.prow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line2);}
.prow:last-child{border-bottom:none;}
.pdate{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);width:40px;flex-shrink:0;}
.pstore{font-size:12.5px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ptag{font-size:10px;padding:1px 6px;border-radius:10px;flex-shrink:0;}
.ptag.low{background:#E2EFE8;color:#1F5C40;}
.ptag.high{background:#F7E3DE;color:#7A2A1B;}
.pprice{font-size:13px;font-weight:500;flex-shrink:0;}

.stat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 10px;display:flex;flex-direction:column;gap:5px;}
.stat-card .lbl{font-size:11px;color:var(--ink-soft);}
.num.big{font-size:15px;font-weight:600;}
.block{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px;}
.block-title{font-size:13px;font-weight:600;margin-bottom:14px;}
.barchart{display:flex;align-items:flex-end;justify-content:space-between;gap:6px;height:96px;}
.barcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.barwrap{position:relative;height:64px;width:60%;display:flex;justify-content:center;}
.bar{width:100%;border-radius:3px 3px 0 0;}
.barpos{background:var(--income);}
.barneg{background:var(--expense);border-radius:0 0 3px 3px;}
.barlbl{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-soft);}
.catrow{display:flex;align-items:center;gap:9px;padding:7px 0;}
.catname{font-size:13px;min-width:48px;}
.catbar-wrap{flex:1;height:14px;background:var(--line2);border-radius:7px;overflow:hidden;}
.catbar{height:100%;border-radius:7px;}
.catval{font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-variant-numeric:tabular-nums;min-width:78px;text-align:right;}

.overlay{position:fixed;inset:0;background:rgba(33,28,21,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.modal{background:var(--paper);width:100%;max-width:560px;border-radius:18px 18px 0 0;max-height:92vh;overflow-y:auto;animation:slideup .22s ease;padding-bottom:env(safe-area-inset-bottom);}
@keyframes slideup{from{transform:translateY(30px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);}
.modal-title{font-size:16px;font-weight:600;}
.x{background:none;border:none;font-size:16px;cursor:pointer;color:var(--ink-soft);}
.modal-body{padding:16px 18px 26px;}
.field{display:block;margin-bottom:14px;}
.field-label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:6px;font-weight:500;}
.inp{width:100%;border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-size:15px;font-family:inherit;background:var(--card);color:var(--ink);}
.inp:focus{outline:none;border-color:var(--ink);}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-bottom:14px;}
.seg button{flex:1;padding:10px;background:var(--card);border:none;font-family:inherit;font-size:14px;cursor:pointer;color:var(--ink-soft);}
.seg button.on{background:var(--ink);color:var(--paper);font-weight:600;}
.seg3 button{padding:9px 4px;font-size:13px;}
.colorpick{display:flex;gap:8px;flex-wrap:wrap;}
.swatch{width:30px;height:30px;border-radius:8px;border:2px solid transparent;cursor:pointer;}
.swatch.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--paper) inset;}
.calc{font-size:13px;color:var(--ink-soft);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:14px;line-height:1.5;}
.calc b{font-family:'IBM Plex Mono',monospace;color:var(--ink);}
.savebtn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
.savebtn:disabled{opacity:.4;}
.toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:11px 18px;border-radius:24px;font-size:13px;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.2);animation:slideup .2s ease;}
</style>

<body>
<div id="app"><div class="center"><div style="font-family:'Fraunces',serif;font-style:italic;color:#796E5B;">장부 불러오는 중…</div></div></div>

<script>
"use strict";

/* ===================== storage (localStorage) ===================== */
var LS = window.localStorage;
function lget(k){ try{ return LS.getItem(k); }catch(e){ return null; } }
function lset(k,v){ try{ LS.setItem(k,v); }catch(e){} }

/* ===================== utils ===================== */
function won(n){
  var v = Math.round(n||0);
  var sign = v<0 ? "\u2212" : "";
  return sign + "\u20A9" + Math.abs(v).toLocaleString("ko-KR");
}
function pad2(n){ return (n<10?"0":"")+n; }
function ymNow(){ var d=new Date(); return d.getFullYear()+"-"+pad2(d.getMonth()+1); }
function ymLabel(ym){ var p=ym.split("-"); return p[0]+"\ub144 "+parseInt(p[1],10)+"\uc6d4"; }
function shiftMonth(ym,delta){
  var a=ym.split("-").map(Number); var y=a[0], m=a[1]+delta;
  while(m>12){m-=12;y++;} while(m<1){m+=12;y--;}
  return y+"-"+pad2(m);
}
function monthsBetween(a,b){
  var x=a.split("-").map(Number), z=b.split("-").map(Number);
  return (z[0]-x[0])*12 + (z[1]-x[1]);
}
function daysInMonth(ym){ var a=ym.split("-").map(Number); return new Date(a[0],a[1],0).getDate(); }
function fmtDate(iso){ if(!iso) return ""; var p=iso.split("-"); return parseInt(p[1],10)+"."+parseInt(p[2],10); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ===================== installment math ===================== */
function instMonthly(i){
  var base=Math.floor(i.totalAmount/i.months);
  var last=i.totalAmount-base*(i.months-1);
  return {base:base,last:last};
}
function instPaymentForMonth(i,ym){
  var idx=monthsBetween(i.startMonth,ym)+1;
  if(idx<1||idx>i.months) return null;
  var m=instMonthly(i);
  return {idx:idx, amount: idx===i.months ? m.last : m.base};
}
function instRemaining(i,ym){
  var idx=monthsBetween(i.startMonth,ym)+1;
  var m=instMonthly(i);
  if(idx<=1) return i.totalAmount;
  if(idx>i.months) return 0;
  return i.totalAmount - m.base*(idx-1);
}

/* ===================== loan math ===================== */
function loanMonthlyRate(l){ return (l.annualRate||0)/100/12; }
function loanAmortPayment(l){
  var r=loanMonthlyRate(l), n=l.months;
  if(r===0) return l.principal/n;
  return l.principal*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}
function loanRemaining(l,ym){
  var idx=monthsBetween(l.startMonth,ym)+1;
  if(idx<=1) return l.principal;
  if(idx>l.months) return 0;
  var r=loanMonthlyRate(l), bal=l.principal;
  if(l.repayType==="principal"){
    bal=l.principal - (l.principal/l.months)*(idx-1);
  }else if(l.repayType==="bullet"){
    bal=l.principal;
  }else{
    var f=loanAmortPayment(l);
    for(var k=1;k<idx;k++){ var it=bal*r; bal=bal-(f-it); }
  }
  return Math.max(0,Math.round(bal));
}
function loanPaymentForMonth(l,ym){
  var idx=monthsBetween(l.startMonth,ym)+1;
  if(idx<1||idx>l.months) return null;
  var r=loanMonthlyRate(l);
  var rs=loanRemaining(l,ym);
  var interest=Math.round(rs*r);
  var payment, pp;
  if(l.repayType==="principal"){
    pp=Math.round(l.principal/l.months);
    if(idx===l.months) pp=rs;
    payment=pp+interest;
  }else if(l.repayType==="bullet"){
    pp = idx===l.months ? rs : 0;
    payment=interest+pp;
  }else{
    var f=Math.round(loanAmortPayment(l));
    if(idx===l.months){ pp=rs; payment=rs+interest; }
    else{ pp=f-interest; payment=f; }
  }
  return {idx:idx, payment:payment, interest:interest, principalPart:pp};
}

/* ===================== savings / investment math ===================== */
// sv: {name, type, monthly, startMonth, months, payDay, accountId, goal, current}
// "current" = 사용자가 직접 적는 현재 모인/평가 금액 (투자는 변동되니 수동)
function svContribForMonth(sv, ym){
  // months=0 또는 미지정이면 "무기한" 적립으로 보고 startMonth부터 계속
  var idx=monthsBetween(sv.startMonth, ym)+1;
  if(idx<1) return null;
  if(sv.months && sv.months>0 && idx>sv.months) return null;
  return {idx:idx, amount:sv.monthly||0};
}
// 시작~현재월까지 납입 누적(직접 넣은 current와 별개로 계산용)
function svContributedTo(sv, ym){
  var idx=monthsBetween(sv.startMonth, ym)+1;
  if(idx<1) return 0;
  var n = sv.months && sv.months>0 ? Math.min(idx, sv.months) : idx;
  return (sv.monthly||0)*Math.max(0,n);
}

/* ===================== categories ===================== */
var EXP_CATS=["\uc8fc\uac70","\uc2dd\ube44","\ud1b5\uc2e0","\uad6c\ub3c5","\ubcf4\ud5d8","\uad50\ud1b5","\uc758\ub8cc","\uac74\uac15","\uc5c5\ubb34","\uce74\ub4dc/\ud560\ubd80","\ub300\ucd9c","\uc800\ucd95","\uae30\ud0c0"];
var INC_CATS=["\uae09\uc5ec","\ubd80\uc218\uc785","\uae30\ud0c0"];
var CAT_COLOR={"\uc8fc\uac70":"#B8860B","\uc2dd\ube44":"#BB3B27","\ud1b5\uc2e0":"#3A6EA5","\uad6c\ub3c5":"#8E4585","\ubcf4\ud5d8":"#2C7A52","\uad50\ud1b5":"#C2691C","\uc758\ub8cc":"#C0504D","\uac74\uac15":"#3F9E8C","\uc5c5\ubb34":"#4A6FA5","\uce74\ub4dc/\ud560\ubd80":"#6B4E9E","\ub300\ucd9c":"#9E3B5E","\uc800\ucd95":"#1F4E45","\uae30\ud0c0":"#7A6F5C","\uac00\uc804":"#6B4E9E","\uc758\ub958":"#8E4585"};
var REPAY_LABEL={amortizing:"\uc6d0\ub9ac\uae08\uade0\ub4f1",principal:"\uc6d0\uae08\uade0\ub4f1",bullet:"\ub9cc\uae30\uc77c\uc2dc"};
var SWATCHES=["#2C7A52","#B8860B","#BB3B27","#3A6EA5","#8E4585","#1F4E45","#C2691C","#6B4E9E"];

/* ===================== seed ===================== */
function seed(){
  var aLiving=uid(), aFixed=uid(), aSave=uid(), aCard=uid();
  return {
    config:{
      accounts:[
        {id:aLiving,name:"\uc6d4\uae09\u00b7\uc0dd\ud65c\ube44",color:"#2C7A52",base:1200000},
        {id:aFixed,name:"\uace0\uc815\uc9c0\ucd9c",color:"#B8860B",base:850000},
        {id:aCard,name:"\uce74\ub4dc\uac12",color:"#BB3B27",base:520000},
        {id:aSave,name:"\ube44\uc0c1\uae08",color:"#3A6EA5",base:3000000}
      ],
      fixedItems:[
        {id:uid(),name:"\uc6d4\uae09",type:"income",amount:3200000,day:25,accountId:aLiving,cat:"\uae09\uc5ec"},
        {id:uid(),name:"\uc6d4\uc138",type:"expense",amount:550000,day:1,accountId:aFixed,cat:"\uc8fc\uac70"},
        {id:uid(),name:"\uad00\ub9ac\ube44",type:"expense",amount:130000,day:10,accountId:aFixed,cat:"\uc8fc\uac70"},
        {id:uid(),name:"\ubcf4\ud5d8\ub8cc",type:"expense",amount:120000,day:5,accountId:aFixed,cat:"\ubcf4\ud5d8"},
        {id:uid(),name:"\ud1b5\uc2e0\ube44",type:"expense",amount:66000,day:15,accountId:aFixed,cat:"\ud1b5\uc2e0"},

/* ===================== state & persistence ===================== */
var state={ config:null, ym:ymNow(), month:null, tab:"timeline", filter:"all" };
var CFG_KEY="ledger:config";
function monthKey(ym){ return "ledger:month:"+ym; }

function loadConfig(){
  var raw=lget(CFG_KEY);
  if(raw){
    var c=JSON.parse(raw);
    if(!c.loans) c.loans=[];
    if(!c.savings) c.savings=[];
    if(!c.priceItems) c.priceItems=[];
    if(!c.installments) c.installments=[];
    return {config:c, seedMonth:null};
  }
  var s=seed();
  lset(CFG_KEY, JSON.stringify(s.config));
  return {config:s.config, seedMonth:s.seedMonth};
}
function saveConfig(){ lset(CFG_KEY, JSON.stringify(state.config)); }
function loadMonth(ym, seedMonth){
  var raw=lget(monthKey(ym));
  if(raw) return JSON.parse(raw);
  var m={start:{}, tx: (seedMonth && seedMonth.ym===ym) ? seedMonth.tx : []};
  lset(monthKey(ym), JSON.stringify(m));
  return m;
}
function saveMonth(){ lset(monthKey(state.ym), JSON.stringify(state.month)); }

/* ===================== derived ===================== */
function accById(id){ for(var i=0;i<state.config.accounts.length;i++) if(state.config.accounts[i].id===id) return state.config.accounts[i]; return null; }
function accName(id){ var a=accById(id); return a?a.name:"\u2014"; }
function accColor(id){ var a=accById(id); return a?a.color:"#999"; }
function startBal(id){
  if(state.month.start && state.month.start[id]!=null) return state.month.start[id];
  var a=accById(id); return a?a.base:0;
}
function buildEvents(){
  var ym=state.ym, c=state.config, dim=daysInMonth(ym), ev=[];
  c.fixedItems.forEach(function(f){
    ev.push({day:Math.min(f.day,dim),name:f.name,type:f.type,amount:f.amount,accountId:f.accountId,cat:f.cat,kind:"fixed"});
  });
  c.installments.forEach(function(i){
    var p=instPaymentForMonth(i,ym);
    if(p) ev.push({day:Math.min(i.payDay,dim),name:i.name+" \ud560\ubd80 ("+p.idx+"/"+i.months+")",type:"expense",amount:p.amount,accountId:i.accountId,cat:"\uce74\ub4dc/\ud560\ubd80",kind:"inst"});
  });
  (c.loans||[]).forEach(function(l){
    var p=loanPaymentForMonth(l,ym);
    if(p) ev.push({day:Math.min(l.payDay,dim),name:l.name+" \uc0c1\ud658 ("+p.idx+"/"+l.months+")",type:"expense",amount:p.payment,accountId:l.accountId,cat:"\ub300\ucd9c",kind:"loan",meta:"\uc774\uc790 "+won(p.interest)});
  });
  (c.savings||[]).forEach(function(s){
    var p=svContribForMonth(s,ym);
    if(p && p.amount>0){
      var label=s.months&&s.months>0 ? (p.idx+"/"+s.months) : p.idx+"\ud68c";
      ev.push({day:Math.min(s.payDay,dim),name:s.name+" \ub0a9\uc785 ("+label+")",type:"expense",amount:p.amount,accountId:s.accountId,cat:"\uc800\ucd95",kind:"saving"});
    }
  });
  state.month.tx.forEach(function(t){
    ev.push({day:Math.min(t.day,dim),name:t.name,type:t.type,amount:t.amount,accountId:t.accountId,cat:t.cat,kind:"tx",txId:t.id});
  });
  ev.sort(function(a,b){ return a.day-b.day; });
  return ev;
}
function accNet(id){
  return buildEvents().filter(function(e){return e.accountId===id;}).reduce(function(s,e){return s+(e.type==="income"?e.amount:-e.amount);},0);
}

/* ===================== render: shell ===================== */
function render(){
  var app=document.getElementById("app");
  var tabs=[["timeline","\ud0c0\uc784\ub77c\uc778"],["accounts","\ud1b5\uc7a5"],["fixed","\uace0\uc815\ud56d\ubaa9"],["inst","\ud560\ubd80"],["loan","\ub300\ucd9c"],["saving","\uc801\uae08\u00b7\ud22c\uc790"],["price","\uad6c\ub9e4\uac00"],["stats","\ud1b5\uacc4"]];
  var html="";
  html+='<header class="masthead"><div class="brand"><span class="brand-ko">\uac00\uacc4\ubd80</span><span class="brand-en">my ledger</span></div>';
  html+='<div class="monthnav"><button class="navbtn" data-act="prevMonth">\u2039</button><span class="monthlabel">'+ymLabel(state.ym)+'</span><button class="navbtn" data-act="nextMonth">\u203a</button></div></header>';
  html+='<nav class="tabs">';
  tabs.forEach(function(t){ html+='<button class="tab'+(state.tab===t[0]?" on":"")+'" data-act="tab" data-tab="'+t[0]+'">'+t[1]+'</button>'; });
  html+='</nav><main class="content" id="content"></main>';
  app.innerHTML=html;
  document.getElementById("content").innerHTML=renderTab();
}

function renderTab(){
  switch(state.tab){
    case "timeline": return renderTimeline();
    case "accounts": return renderAccounts();
    case "fixed": return renderFixed();
    case "inst": return renderInst();
    case "loan": return renderLoans();
    case "saving": return renderSavings();
    case "price": return renderPrices();
    case "stats": return renderStats();
  }
  return "";
}

/* ===================== render: timeline ===================== */
function renderTimeline(){
  var events=buildEvents();
  var filtered = state.filter==="all" ? events : events.filter(function(e){return e.accountId===state.filter;});
  var baseline = state.filter==="all"
    ? state.config.accounts.reduce(function(s,a){return s+startBal(a.id);},0)
    : startBal(state.filter);
  var run=baseline, minBal=baseline, byDay={};
  filtered.forEach(function(e){
    run += e.type==="income"? e.amount : -e.amount;
    if(!byDay[e.day]) byDay[e.day]={events:[],end:run};
    byDay[e.day].events.push(e); byDay[e.day].end=run;
    if(run<minBal) minBal=run;
  });
  var days=Object.keys(byDay).map(Number).sort(function(a,b){return a-b;});
  var endBal=run;
  var totalIn=filtered.filter(function(e){return e.type==="income";}).reduce(function(s,e){return s+e.amount;},0);
  var totalOut=filtered.filter(function(e){return e.type==="expense";}).reduce(function(s,e){return s+e.amount;},0);

  var h="";
  h+='<div class="filterrow"><button class="pill'+(state.filter==="all"?" on":"")+'" data-act="filter" data-acc="all" '+(state.filter==="all"?'style="background:var(--ink);color:#fff;border-color:var(--ink);"':"")+'>\uc804\uccb4</button>';
  state.config.accounts.forEach(function(a){
    var on=state.filter===a.id;
    h+='<button class="pill" data-act="filter" data-acc="'+a.id+'" '+(on?'style="background:'+a.color+';color:#fff;border-color:'+a.color+';"':"")+'>'+esc(a.name)+'</button>';
  });
  h+='</div>';
  h+='<div class="tl-summary"><div class="tl-sum-cell"><span class="lbl">\uc6d4\ucd08</span><span class="num">'+won(baseline)+'</span></div>';
  h+='<div class="tl-sum-cell"><span class="lbl">\uc218\uc785</span><span class="num inc">+'+won(totalIn)+'</span></div>';
  h+='<div class="tl-sum-cell"><span class="lbl">\uc9c0\ucd9c</span><span class="num exp">\u2212'+won(totalOut).replace("\u20A9","\u20A9")+'</span></div>';
  h+='<div class="tl-sum-cell"><span class="lbl">\uc6d4\ub9d0 \uc608\uc0c1</span><span class="num strong" style="color:'+(endBal<0?"var(--expense)":"var(--ink)")+'">'+won(endBal)+'</span></div></div>';
  if(minBal<0){
    h+='<div class="warn">\u26a0 \uc774\ubc88 \ub2ec \uc794\uc561\uc774 \ucd5c\uc800 <b>'+won(minBal)+'</b>\uae4c\uc9c0 \ub0b4\ub824\uac00\uc694. \uc9c0\ucd9c \ub0a0\uc9dc\ub97c \uc870\uc815\ud558\uac70\ub098 \uc774\uccb4\uac00 \ud544\uc694\ud574\uc694.</div>';
  }
  h+='<button class="addbtn" data-act="addTx" style="margin-top:0;margin-bottom:16px">\uff0b \uc774\ubc88 \ub2ec \ub0b4\uc5ed \ucd94\uac00</button>';
  h+='<div class="ledger">';
  if(days.length===0) h+='<div class="empty">\uc774 \ub2ec\uc5d0 \ub4f1\ub85d\ub41c \ub0b4\uc5ed\uc774 \uc5c6\uc5b4\uc694.</div>';
  days.forEach(function(d){
    var rec=byDay[d];
    h+='<div class="day"><div class="day-rail"><span class="day-num">'+d+'</span><span class="day-suffix">\uc77c</span></div><div class="day-body">';
    rec.events.forEach(function(e){
      var clickable=e.kind==="tx";
      h+='<div class="event" '+(clickable?'data-act="editTx" data-id="'+e.txId+'" style="cursor:pointer;"':"")+'>';
      h+='<span class="ev-dot" style="background:'+accColor(e.accountId)+'"></span>';
      h+='<div class="ev-main"><span class="ev-name">'+esc(e.name)+'</span><span class="ev-meta">'+esc(accName(e.accountId))+' \u00b7 '+esc(e.cat)+(e.kind==="fixed"?" \u00b7 \uace0\uc815":"")+(e.kind==="loan"?" \u00b7 "+esc(e.meta):"")+'</span></div>';
      h+='<span class="ev-amt '+(e.type==="income"?"inc":"exp")+'">'+(e.type==="income"?"+":"\u2212")+won(e.amount).replace("\u2212","")+'</span>';
      if(clickable) h+='<button class="del" data-act="delTx" data-id="'+e.txId+'">\u2715</button>';
      h+='</div>';
    });
    h+='<div class="day-balance" style="color:'+(rec.end<0?"var(--expense)":"var(--ink-soft)")+'">\uc794\uc561 '+won(rec.end)+'</div>';
    h+='</div></div>';
  });
  h+='</div>';
  return h;
}

/* ===================== render: repeat-purchase price log ===================== */
function priceStats(item){
  var hist=(item.history||[]).slice();
  if(hist.length===0) return {count:0};
  hist.sort(function(a,b){ return a.date<b.date?1:(a.date>b.date?-1:0); }); // newest first
  var latest=hist[0];
  var min=hist[0], max=hist[0], sum=0;
  hist.forEach(function(p){ if(p.price<min.price) min=p; if(p.price>max.price) max=p; sum+=p.price; });
  return {count:hist.length, latest:latest, min:min, max:max, avg:Math.round(sum/hist.length), sorted:hist};
}

/* ===================== render: stats ===================== */
function renderStats(){
  var events=buildEvents(), c=state.config, ym=state.ym;
  var totalIn=events.filter(function(e){return e.type==="income";}).reduce(function(s,e){return s+e.amount;},0);
  var totalOut=events.filter(function(e){return e.type==="expense";}).reduce(function(s,e){return s+e.amount;},0);
  var net=totalIn-totalOut;
  var catMap={};
  events.forEach(function(e){ if(e.type==="expense") catMap[e.cat]=(catMap[e.cat]||0)+e.amount; });
  var cats=Object.keys(catMap).map(function(k){return [k,catMap[k]];}).sort(function(a,b){return b[1]-a[1];});
  var catMax=Math.max.apply(null,[1].concat(cats.map(function(x){return x[1];})));
  var recurIn=c.fixedItems.filter(function(f){return f.type==="income";}).reduce(function(s,f){return s+f.amount;},0);
  var recurOut=c.fixedItems.filter(function(f){return f.type==="expense";}).reduce(function(s,f){return s+f.amount;},0);
  var months=[];
  for(var k=-2;k<=3;k++){
    var m=shiftMonth(ym,k), instOut=0;
    c.installments.forEach(function(i){ var p=instPaymentForMonth(i,m); if(p) instOut+=p.amount; });
    var loanOut=0;
    (c.loans||[]).forEach(function(l){ var p=loanPaymentForMonth(l,m); if(p) loanOut+=p.payment; });
    var svOut=0;
    (c.savings||[]).forEach(function(s){ var p=svContribForMonth(s,m); if(p) svOut+=p.amount; });
    var txNet=0;
    if(m===ym) txNet=state.month.tx.reduce(function(s,t){return s+(t.type==="income"?t.amount:-t.amount);},0);
    months.push({ym:m,net:recurIn-recurOut-instOut-loanOut-svOut+txNet,cur:m===ym});
  }
  var absMax=Math.max.apply(null,[1].concat(months.map(function(m){return Math.abs(m.net);})));

  var h='<div class="stat-cards"><div class="stat-card"><span class="lbl">\uc218\uc785</span><span class="num inc big">+'+won(totalIn)+'</span></div>';
  h+='<div class="stat-card"><span class="lbl">\uc9c0\ucd9c</span><span class="num exp big">\u2212'+won(totalOut).replace("\u2212","")+'</span></div>';
  h+='<div class="stat-card"><span class="lbl">\uc21c\ud750\ub984</span><span class="num big strong" style="color:'+(net<0?"var(--expense)":"var(--income)")+'">'+(net>=0?"+":"\u2212")+won(net).replace("\u2212","")+'</span></div></div>';

  h+='<div class="block"><div class="block-title">\uc6d4\ubcc4 \uc21c\ud750\ub984 <span class="muted">(\uc608\uc0c1)</span></div><div class="barchart">';
  months.forEach(function(m){
    var hh=Math.max(3,Math.abs(m.net)/absMax*64), pos=m.net>=0;
    h+='<div class="barcol"><div class="barwrap"><div class="bar '+(pos?"barpos":"barneg")+'" style="height:'+hh+'px;margin-top:'+(pos?(64-hh):64)+'px;'+(m.cur?"outline:2px solid var(--ink);":"")+'"></div></div><span class="barlbl">'+parseInt(m.ym.split("-")[1],10)+'\uc6d4</span></div>';
  });
  h+='</div></div>';

  h+='<div class="block"><div class="block-title">\uc9c0\ucd9c \uce74\ud14c\uace0\ub9ac</div>';
  if(cats.length===0) h+='<div class="empty sm">\uc9c0\ucd9c \ub0b4\uc5ed\uc774 \uc5c6\uc5b4\uc694.</div>';
  cats.forEach(function(c2){
    h+='<div class="catrow"><span class="catname">'+esc(c2[0])+'</span><div class="catbar-wrap"><div class="catbar" style="width:'+(c2[1]/catMax*100)+'%;background:'+(CAT_COLOR[c2[0]]||"#7A6F5C")+'"></div></div><span class="catval">'+won(c2[1])+'</span></div>';
  });
  h+='</div>';

  h+='<div class="block"><div class="block-title">\ud1b5\uc7a5\ubcc4 \ud750\ub984</div>';
  c.accounts.forEach(function(a){
    var n=events.filter(function(e){return e.accountId===a.id;}).reduce(function(s,e){return s+(e.type==="income"?e.amount:-e.amount);},0);
    h+='<div class="catrow"><span class="ev-dot" style="background:'+a.color+'"></span><span class="catname flex1">'+esc(a.name)+'</span><span class="num '+(n>=0?"inc":"exp")+'">'+(n>=0?"+":"\u2212")+won(n).replace("\u2212","")+'</span></div>';
  });
  h+='</div>';
  return h;
}

/* ===================== mutations ===================== */
function commitConfig(){ saveConfig(); render(); }
function commitMonth(){ saveMonth(); render(); }

function delAccount(id){
  state.config.accounts=state.config.accounts.filter(function(a){return a.id!==id;});
  state.config.fixedItems=state.config.fixedItems.filter(function(f){return f.accountId!==id;});
  state.config.installments=state.config.installments.filter(function(i){return i.accountId!==id;});
  state.config.loans=(state.config.loans||[]).filter(function(l){return l.accountId!==id;});
  state.config.savings=(state.config.savings||[]).filter(function(s){return s.accountId!==id;});
  if(state.filter===id) state.filter="all";
  commitConfig();
}
function carryOver(){
  var next=shiftMonth(state.ym,1);
  var raw=lget(monthKey(next));
  var nm=raw?JSON.parse(raw):{start:{},tx:[]};
  var ns={};
  state.config.accounts.forEach(function(a){ ns[a.id]=startBal(a.id)+accNet(a.id); });
  if(!nm.start) nm.start={};
  Object.keys(ns).forEach(function(k){ nm.start[k]=ns[k]; });
  lset(monthKey(next), JSON.stringify(nm));
  toast(ymLabel(next)+" \uc6d4\ucd08 \uc794\uc561\uc73c\ub85c \uc774\uc6d4\ud588\uc5b4\uc694");
}

/* ===================== backup: export / import ===================== */
function collectAllData(){
  var months={};
  for(var i=0;i<LS.length;i++){
    var k=LS.key(i);
    if(k && k.indexOf("ledger:month:")===0){
      months[k.slice("ledger:month:".length)]=JSON.parse(lget(k));
    }
  }
  return { app:"\uac00\uacc4\ubd80", format:"ledger-backup", version:1, exportedAt:new Date().toISOString(), config:state.config, months:months };
}
function exportData(){
  try{
    var data=collectAllData();
    var json=JSON.stringify(data,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var d=new Date();
    var fname="\uac00\uacc4\ubd80-\ubc31\uc5c5-"+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+".json";
    var a=document.createElement("a");
    a.href=url; a.download=fname; document.body.appendChild(a); a.click();
    setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); },100);
    var mCount=Object.keys(data.months).length;
    toast("\ubc31\uc5c5 \ud30c\uc77c\uc744 \ub0b4\ubcf4\ub0c8\uc5b4\uc694 ("+mCount+"\uac1c\uc6d4)");
  }catch(e){ toast("\ub0b4\ubcf4\ub0b4\uae30 \uc2e4\ud328: "+e.message); }
}
function applyImport(data){
  if(!data || data.format!=="ledger-backup" || !data.config){
    toast("\uac00\uacc4\ubd80 \ubc31\uc5c5 \ud30c\uc77c\uc774 \uc544\ub2c8\uc5d0\uc694"); return;
  }
  var c=data.config;
  if(!c.loans) c.loans=[]; if(!c.installments) c.installments=[]; if(!c.savings) c.savings=[]; if(!c.priceItems) c.priceItems=[];
  lset(CFG_KEY, JSON.stringify(c));
  // wipe existing month keys, then write imported
  var toDel=[];
  for(var i=0;i<LS.length;i++){ var k=LS.key(i); if(k && k.indexOf("ledger:month:")===0) toDel.push(k); }
  toDel.forEach(function(k){ try{ LS.removeItem(k); }catch(e){} });
  var months=data.months||{};
  Object.keys(months).forEach(function(ym){ lset(monthKey(ym), JSON.stringify(months[ym])); });
  // reload state
  state.config=c;
  state.ym=ymNow();
  state.month=loadMonth(state.ym, null);
  state.filter="all";
  render();
  toast("\ubd88\ub7ec\uc654\uc5b4\uc694 \u00b7 \ud1b5\uc7a5 "+c.accounts.length+"\uac1c, "+Object.keys(months).length+"\uac1c\uc6d4");
}
function importData(){
  var inp=document.createElement("input");
  inp.type="file"; inp.accept="application/json,.json";
  inp.addEventListener("change",function(){
    var file=inp.files && inp.files[0];
    if(!file) return;
    var reader=new FileReader();
    reader.onload=function(){
      var data;
      try{ data=JSON.parse(reader.result); }
      catch(e){ toast("\ud30c\uc77c\uc744 \uc77d\uc744 \uc218 \uc5c6\uc5b4\uc694"); return; }
      confirmImport(data);
    };
    reader.onerror=function(){ toast("\ud30c\uc77c \uc77d\uae30 \uc2e4\ud328"); };
    reader.readAsText(file);
  });
  inp.click();
}
function confirmImport(data){
  var n = (data && data.config && data.config.accounts) ? data.config.accounts.length : 0;
  var mc = (data && data.months) ? Object.keys(data.months).length : 0;

/* ===================== toast ===================== */
var toastTimer=null;
function toast(msg){
  var old=document.querySelector(".toast"); if(old) old.remove();
  var t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.remove(); }, 1800);
}

/* ===================== modal framework ===================== */
function closeModal(){ var o=document.querySelector(".overlay"); if(o) o.remove(); }
function openModal(title, bodyHtml, onMount){
  closeModal();
  var ov=document.createElement("div"); ov.className="overlay";
  ov.innerHTML='<div class="modal"><div class="modal-head"><span class="modal-title">'+esc(title)+'</span><button class="x" data-mact="close">\u2715</button></div><div class="modal-body">'+bodyHtml+'</div></div>';
  ov.addEventListener("click",function(e){ if(e.target===ov) closeModal(); });
  ov.querySelector('[data-mact="close"]').addEventListener("click",closeModal);
  document.body.appendChild(ov);
  if(onMount) onMount(ov);
}
function fmtNum(v){ return (v===""||v==null)?"":Number(v).toLocaleString("ko-KR"); }
function bindNumInput(input){
  input.addEventListener("input",function(){
    var digits=input.value.replace(/[^0-9]/g,"");
    input.value = digits===""?"":Number(digits).toLocaleString("ko-KR");
  });
}
function numVal(input){ var d=input.value.replace(/[^0-9]/g,""); return d===""?"":parseInt(d,10); }
function selectHtml(name, options, selected){
  var s='<select class="inp" id="'+name+'">';
  options.forEach(function(o){ s+='<option value="'+esc(o)+'"'+(o===selected?" selected":"")+'>'+esc(o)+'</option>'; });
  return s+'</select>';
}
function accountSelectHtml(name, selected){
  var s='<select class="inp" id="'+name+'">';
  state.config.accounts.forEach(function(a){ s+='<option value="'+a.id+'"'+(a.id===selected?" selected":"")+'>'+esc(a.name)+'</option>'; });
  return s+'</select>';
}

      }
      [pr,months,start,day].forEach(function(el){ el.addEventListener("input",upd); el.addEventListener("change",upd); });

      });

      ov.querySelector("#f_save").addEventListener("click",function(){
        var name=ov.querySelector("#f_name").value.trim(); var p=numVal(pr);

        var rec={name:name,principal:p||0,annualRate:parseFloat(rate.value)||0,months:Math.max(1,parseInt(months.value||"1",10)),startMonth:start.value,payDay:clampDay(day.value),accountId:ov.querySelector("#f_acc").value,repayType:repay};
        if(data.id){ var l=findById(state.config.loans,data.id); Object.assign(l,rec); }
        else { rec.id=uid(); state.config.loans.push(rec); }
        closeModal(); commitConfig();
      });
    });
  }
  build();
}

    '<label class="field"><span class="field-label">\ud604\uc7ac \ubaa8\uc778/\ud3c9\uac00 \uae08\uc561</span><input class="inp" id="f_cur" inputmode="numeric" value="'+fmtNum(s.current)+'" placeholder="0"></label>'+
    '<div class="row2"><button class="addbtn ghost flex1" id="f_sync">\ub0a9\uc785 \uc774\ub860\uac12\uc73c\ub85c \ub9de\ucd94\uae30</button></div>'+
    '<button class="savebtn" id="f_save" style="margin-top:10px">\uc800\uc7a5</button>';
  openModal(s.name+" \u00b7 \uae08\uc561 \uc5c5\ub370\uc774\ud2b8", body, function(ov){
    var inp=ov.querySelector("#f_cur"); bindNumInput(inp);
    ov.querySelector("#f_sync").addEventListener("click",function(){ inp.value=contributed.toLocaleString("ko-KR"); });
    ov.querySelector("#f_save").addEventListener("click",function(){
      s.current=numVal(inp)||0; closeModal(); commitConfig();
    });
  });
}

/* ===================== modal: price item / purchase ===================== */
function priceItemForm(data){
  data=data||{};
  var body=''+
    '<label class="field"><span class="field-label">\ud488\ubaa9 \uc774\ub984</span><input class="inp" id="f_name" value="'+esc(data.name||"")+'" placeholder="\uc608: \ud1a0\ub108, \ub370\uc77c\ub9ac \ub80c\uc988"></label>'+
    '<label class="field"><span class="field-label">\uaddc\uaca9/\uc6a9\ub7c9 <span class="muted" style="font-weight:400">\u00b7 \uc120\ud0dd</span></span><input class="inp" id="f_unit" value="'+esc(data.unit||"")+'" placeholder="\uc608: 200ml, 1\ubc15\uc2a4(30\uc77c)"></label>'+
    '<button class="savebtn" id="f_save">\uc800\uc7a5</button>';
  openModal(data.id?"\ud488\ubaa9 \uc218\uc815":"\ud488\ubaa9 \ucd94\uac00", body, function(ov){
    ov.querySelector("#f_save").addEventListener("click",function(){
      var name=ov.querySelector("#f_name").value.trim(); if(!name) return;
      var unit=ov.querySelector("#f_unit").value.trim();
      if(data.id){ var it=findById(state.config.priceItems,data.id); it.name=name; it.unit=unit; }
      else state.config.priceItems.push({id:uid(),name:name,unit:unit,history:[]});
      closeModal(); commitConfig();
    });
  });
}
function purchaseForm(itemId){
  var it=findById(state.config.priceItems,itemId); if(!it) return;
  var s=priceStats(it);
  var body=''+
    '<p class="hint" style="margin-bottom:14px">'+esc(it.name)+(it.unit?' ('+esc(it.unit)+')':'')+' \u00b7 \uc138\uc77c\uac00\ub97c \uc801\uc5b4\ubcf4\uace0 \uc544\ub798 \ube44\uad50\ub97c \ud655\uc778\ud55c \ub4a4, \uc0b0 \uacbd\uc6b0\uc5d0\ub9cc \uc800\uc7a5\ud558\uba74 \ub3fc\uc694.</p>'+
    '<label class="field"><span class="field-label">\uac00\uaca9</span><input class="inp" id="f_price" inputmode="numeric" value="" placeholder="0"></label>'+
    '<div class="calc" id="f_cmp" style="display:none"></div>'+
    '<div class="row2"><label class="field flex1"><span class="field-label">\ub0a0\uc9dc</span><input class="inp" id="f_date" type="date" value="'+new Date().toISOString().slice(0,10)+'"></label>'+
    '<label class="field flex1"><span class="field-label">\uad6c\uc785\ucc98 <span class="muted" style="font-weight:400">\u00b7 \uc120\ud0dd</span></span><input class="inp" id="f_store" value="" placeholder="\uc608: \uc62c\ub9ac\ube0c\uc601"></label></div>'+
    '<button class="savebtn" id="f_save">\uad6c\ub9e4 \uae30\ub85d \uc800\uc7a5</button>';
  openModal("\uad6c\ub9e4 \uae30\ub85d / \uac00\uaca9 \ube44\uad50", body, function(ov){
    var price=ov.querySelector("#f_price"), cmp=ov.querySelector("#f_cmp");
    bindNumInput(price);
    function upd(){
      var v=numVal(price);
      if(v===""||v===0){ cmp.style.display="none"; return; }
      cmp.style.display="block";
      if(s.count===0){ cmp.innerHTML="\uccab \uad6c\ub9e4\ub77c \ube44\uad50 \ub300\uc0c1\uc774 \uc544\uc9c1 \uc5c6\uc5b4\uc694."; return; }
      var dMin=v-s.min.price, dLast=v-s.latest.price;
      function tag(d){ if(d<0) return '<b style="color:var(--income)">'+won(-d).replace("\u20A9","\u20A9")+' \uc384</b>'; if(d>0) return '<b style="color:var(--expense)">'+won(d).replace("\u20A9","\u20A9")+' \ube44\uc34c</b>'; return '<b>\ub3d9\uc77c</b>'; }
      var line="\ucd5c\uc800\uac00("+won(s.min.price)+") \ub300\ube44 "+tag(dMin)+'<div style="margin-top:6px">\uc9c1\uc804\uac00('+won(s.latest.price)+") \ub300\ube44 "+tag(dLast)+'</div>';
      if(dMin<=0) line+='<div style="margin-top:8px;color:var(--income)">\u2713 \uc5ed\ub300 \ucd5c\uc800\uac00 \uc218\uc900! \uc0b4\ub9cc\ud574\uc694</div>';
      else if(dMin>s.min.price*0.1) line+='<div style="margin-top:8px;color:var(--expense)">\u26a0 \ucd5c\uc800\uac00\ubcf4\ub2e4 \uaf64 \ube44\uc2f8\uc694. \uae09\ud558\uc9c0 \uc54a\uc73c\uba74 \ub300\uae30 \ucd94\ucc9c</div>';
      cmp.innerHTML=line;
    }
    price.addEventListener("input",upd);
    ov.querySelector("#f_save").addEventListener("click",function(){
      var v=numVal(price); if(v===""){ return; }
      it.history=it.history||[];
      it.history.push({id:uid(),date:ov.querySelector("#f_date").value,price:v||0,store:ov.querySelector("#f_store").value.trim()});
      closeModal(); commitConfig();
    });
  });
}

/* ===================== modal: tx ===================== */
function txForm(data){
  data=data||{};
  var editing=!!data.id;
  var type=data.type||"expense";
  var cat=data.cat||(type==="income"?"\ubd80\uc218\uc785":"\uc2dd\ube44");
  function build(){
    var catList=type==="income"?INC_CATS:EXP_CATS;
    var body=''+
      '<div class="seg" id="f_seg"><button type="button" data-type="expense" class="'+(type==="expense"?"on":"")+'">\uc9c0\ucd9c</button><button type="button" data-type="income" class="'+(type==="income"?"on":"")+'">\uc218\uc785</button></div>'+
      '<label class="field"><span class="field-label">\ub0b4\uc6a9</span><input class="inp" id="f_name" value="'+esc(data.name||"")+'" placeholder="\uc608: \ub9c8\ud2b8 \uc7a5\ubcf4\uae30"></label>'+
      '<label class="field"><span class="field-label">\uae08\uc561</span><input class="inp" id="f_amt" inputmode="numeric" value="'+fmtNum(data.amount)+'" placeholder="0"></label>'+
      '<div class="row2"><label class="field flex1"><span class="field-label">\ub0a0\uc9dc(\uc77c)</span><input class="inp" id="f_day" type="number" min="1" max="31" value="'+(data.day||new Date().getDate())+'"></label>'+
      '<label class="field flex1"><span class="field-label">\ud1b5\uc7a5</span>'+accountSelectHtml("f_acc", data.accountId||state.config.accounts[0].id)+'</label></div>'+
      '<label class="field"><span class="field-label">\uce74\ud14c\uace0\ub9ac</span>'+selectHtml("f_cat", catList, cat)+'</label>'+
      '<button class="savebtn" id="f_save">\uc800\uc7a5</button>';
    openModal(editing?"\ub0b4\uc5ed \uc218\uc815":"\uc774\ubc88 \ub2ec \ub0b4\uc5ed \ucd94\uac00", body, function(ov){
      bindNumInput(ov.querySelector("#f_amt"));
      ov.querySelectorAll("#f_seg button").forEach(function(b){
        b.addEventListener("click",function(){ type=b.dataset.type; cat=type==="income"?"\ubd80\uc218\uc785":"\uc2dd\ube44"; build(); });
      });
      ov.querySelector("#f_save").addEventListener("click",function(){
        var name=ov.querySelector("#f_name").value.trim(); var amt=numVal(ov.querySelector("#f_amt"));
        if(!name||amt===""){ return; }
        var rec={type:type,name:name,amount:amt||0,day:clampDay(ov.querySelector("#f_day").value),accountId:ov.querySelector("#f_acc").value,cat:ov.querySelector("#f_cat").value};
        if(data.id){ var t=findById(state.month.tx,data.id); Object.assign(t,rec); }
        else { rec.id=uid(); state.month.tx.push(rec); }
        closeModal(); commitMonth();
      });
    });
  }
  build();
}

/* ===================== helpers ===================== */
function clampDay(v){ var n=parseInt(v||"1",10); if(isNaN(n)) n=1; return Math.max(1,Math.min(31,n)); }
function findById(arr,id){ for(var i=0;i<arr.length;i++) if(arr[i].id===id) return arr[i]; return null; }

/* ===================== event delegation ===================== */
function onClick(e){
  var t=e.target.closest("[data-act]"); if(!t) return;
  var act=t.dataset.act, id=t.dataset.id;
  switch(act){
    case "prevMonth": switchMonth(shiftMonth(state.ym,-1)); break;
    case "nextMonth": switchMonth(shiftMonth(state.ym,1)); break;
    case "tab": state.tab=t.dataset.tab; render(); break;
    case "filter": state.filter=t.dataset.acc; render(); break;
    case "addTx": txForm({}); break;
    case "editTx": txForm(findById(state.month.tx,id)); break;
    case "delTx": state.month.tx=state.month.tx.filter(function(x){return x.id!==id;}); commitMonth(); break;
    case "addAccount": accountForm({}); break;
    case "editAccount": accountForm(accById(id)); break;
    case "delAccount": delAccount(id); break;
    case "addFixed": fixedForm({}); break;
    case "editFixed": fixedForm(findById(state.config.fixedItems,id)); break;
    case "delFixed": state.config.fixedItems=state.config.fixedItems.filter(function(x){return x.id!==id;}); commitConfig(); break;
    case "addInst": instForm({}); break;
    case "editInst": instForm(findById(state.config.installments,id)); break;
    case "delInst": state.config.installments=state.config.installments.filter(function(x){return x.id!==id;}); commitConfig(); break;
    case "addLoan": loanForm({}); break;
    case "editLoan": loanForm(findById(state.config.loans,id)); break;
    case "delLoan": state.config.loans=state.config.loans.filter(function(x){return x.id!==id;}); commitConfig(); break;
    case "addSaving": savingForm({}); break;
    case "editSaving": savingForm(findById(state.config.savings,id)); break;
    case "updateSaving": updateSavingCurrent(id); break;
    case "delSaving": state.config.savings=state.config.savings.filter(function(x){return x.id!==id;}); commitConfig(); break;
    case "addPriceItem": priceItemForm({}); break;
    case "editPriceItem": priceItemForm(findById(state.config.priceItems,id)); break;
    case "delPriceItem": state.config.priceItems=state.config.priceItems.filter(function(x){return x.id!==id;}); commitConfig(); break;
    case "addPurchase": purchaseForm(id); break;
    case "delPurchase": (function(){ var it=findById(state.config.priceItems,id); if(it){ it.history=(it.history||[]).filter(function(p){return p.id!==t.dataset.pid;}); commitConfig(); } })(); break;
    case "carryOver": carryOver(); break;
    case "exportData": exportData(); break;
    case "importData": importData(); break;
  }
}
function onChange(e){
  if(e.target.classList && e.target.classList.contains("balinput")){
    var id=e.target.dataset.acc;
    var digits=e.target.value.replace(/[^0-9-]/g,"");
    if(!state.month.start) state.month.start={};
    state.month.start[id]=parseInt(digits||"0",10);
    saveMonth(); render();
  }
}
function switchMonth(ym){
  state.ym=ym;
  state.month=loadMonth(ym, null);
  render();
}

/* ===================== init ===================== */
(function init(){
  var c=loadConfig();
  state.config=c.config;
  state.ym=ymNow();
  state.month=loadMonth(state.ym, c.seedMonth);
  document.getElementById("app").addEventListener("click", onClick);
  document.getElementById("app").addEventListener("change", onChange);
  render();
  if("serviceWorker" in navigator){
    window.addEventListener("load", function(){ navigator.serviceWorker.register("sw.js").catch(function(){}); });
  }
})();
</script>
</body>
</html>
